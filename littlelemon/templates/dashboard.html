{% extends 'base.html' %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --color-bg: #fafaf9;
    --color-surface: #ffffff;
    --color-text: #1c1917;
    --color-text-muted: #78716c;
    --color-accent: #d97706;
    --color-accent-light: #fef3c7;
    --color-sage-light: #f5f5f4;
    --color-border: #e7e5e4;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
    --radius: 16px;
  }

  [data-theme="dark"] {
    --color-bg: #0c0a09;
    --color-surface: #1c1917;
    --color-text: #fafaf9;
    --color-text-muted: #a8a29e;
    --color-accent: #f59e0b;
    --color-accent-light: rgba(245, 158, 11, 0.1);
    --color-sage-light: #292524;
    --color-border: #44403c;
    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.2);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -1px rgba(0,0,0,0.15);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
  }

  .dashboard-page {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Hero */
  .dashboard-hero {
    background: linear-gradient(135deg, #1c1917 0%, #292524 100%);
    padding: 80px 24px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .dashboard-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(217, 119, 6, 0.12) 0%, transparent 50%);
  }
  .dashboard-hero-content {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
  }
  .dashboard-hero-label {
    display: inline-block;
    color: var(--color-accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .dashboard-hero h1 {
    font-family: var(--font-serif);
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .dashboard-hero h1 em {
    font-style: italic;
    color: var(--color-accent);
  }
  .dashboard-hero p {
    color: #a8a29e;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* Stats Bar */
  .stats-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 2;
    margin-top: -32px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .stat-card {
    background: var(--color-surface);
    border-radius: var(--radius);
    padding: 28px;
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-lg);
    transition: all 0.3s ease;
  }
  .stat-card:hover {
    transform: translateY(-4px);
  }
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-muted);
    margin-bottom: 12px;
  }
  .stat-value {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 700;
    color: var(--color-text);
    line-height: 1;
  }
  .stat-value.accent {
    color: var(--color-accent);
  }

  /* Main Content */
  .dashboard-main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 0;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .section-header h2 {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--color-text);
  }
  .section-header span {
    font-size: 14px;
    color: var(--color-text-muted);
    font-weight: 500;
  }

  /* Order Cards */
  .orders-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .order-card {
    background: var(--color-surface);
    border-radius: var(--radius);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    animation: fadeInUp 0.5s ease both;
  }
  .order-card:hover {
    box-shadow: var(--shadow-md);
    border-color: transparent;
    transform: translateY(-2px);
  }

  .order-header {
    padding: 24px 28px;
    background: linear-gradient(to right, var(--color-sage-light), transparent);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .order-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .order-id {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 700;
    color: var(--color-text);
  }
  .order-id span {
    color: var(--color-text-muted);
    font-weight: 400;
    font-size: 14px;
    margin-left: 4px;
  }
  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .role-manager {
    background: rgba(217, 119, 6, 0.1);
    color: var(--color-accent);
  }
  .role-delivery {
    background: rgba(59, 130, 246, 0.1);
    color: #3b82f6;
  }
  .role-customer {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
  }
  .role-default {
    background: var(--color-sage-light);
    color: var(--color-text-muted);
  }
  .order-date {
    font-size: 13px;
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .order-total {
    text-align: right;
  }
  .order-total-label {
    font-size: 12px;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .order-total-value {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--color-accent);
  }

  /* Items Table */
  .order-items {
    padding: 0;
  }
  .items-header {
    display: grid;
    grid-template-columns: 1fr 100px 100px 100px;
    gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--color-border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-muted);
  }
  .items-header span:nth-child(2),
  .items-header span:nth-child(3),
  .items-header span:nth-child(4) {
    text-align: right;
  }
  .item-row {
    display: grid;
    grid-template-columns: 1fr 100px 100px 100px;
    gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--color-border);
    align-items: center;
    transition: background 0.2s;
  }
  .item-row:last-child {
    border-bottom: none;
  }
  .item-row:hover {
    background: var(--color-sage-light);
  }
  .item-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .item-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--color-accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .item-details h4 {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text);
    margin: 0 0 2px;
  }
  .item-details span {
    font-size: 12px;
    color: var(--color-text-muted);
  }
  .item-qty {
    text-align: right;
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text);
  }
  .item-price {
    text-align: right;
    font-size: 14px;
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
  }
  .item-subtotal {
    text-align: right;
    font-size: 15px;
    font-weight: 700;
    color: var(--color-text);
    font-variant-numeric: tabular-nums;
  }

  .order-footer {
    padding: 16px 28px;
    background: var(--color-sage-light);
    border-top: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--color-text-muted);
  }
  .order-footer strong {
    color: var(--color-text);
    font-weight: 600;
  }

  /* States */
  .state-container {
    text-align: center;
    padding: 80px 24px;
    max-width: 500px;
    margin: 0 auto;
  }
  .state-container h3 {
    font-family: var(--font-serif);
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--color-text);
  }
  .state-container p {
    color: var(--color-text-muted);
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .state-error h3 {
    color: #dc2626;
  }

  .spinner {
    width: 40px;
    height: 40px;
    margin: 0 auto 20px;
    border: 3px solid var(--color-sage-light);
    border-top-color: var(--color-accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .retry-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--color-text);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }
  .retry-btn:hover {
    background: var(--color-accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(217, 119, 6, 0.25);
  }

  /* Skeleton */
  .skeleton-card {
    background: var(--color-surface);
    border-radius: var(--radius);
    border: 1px solid var(--color-border);
    overflow: hidden;
  }
  .skeleton-header {
    height: 80px;
    background: linear-gradient(90deg, var(--color-sage-light) 25%, #e7e5e4 50%, var(--color-sage-light) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  .skeleton-body {
    padding: 24px 28px;
  }
  .skeleton-line {
    height: 16px;
    background: linear-gradient(90deg, var(--color-sage-light) 25%, #e7e5e4 50%, var(--color-sage-light) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .skeleton-line.short { width: 30%; }
  .skeleton-line.medium { width: 60%; }
  .skeleton-line.long { width: 100%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 968px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .dashboard-hero { padding: 60px 20px 40px; }
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { padding: 20px; }
    .stat-value { font-size: 24px; }
    .items-header { display: none; }
    .item-row {
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      padding: 16px 20px;
    }
    .item-info { grid-column: 1 / -1; }
    .item-qty::before { content: 'Qty: '; color: var(--color-text-muted); font-weight: 400; font-size: 13px; }
    .item-price::before { content: 'Each: '; color: var(--color-text-muted); font-weight: 400; font-size: 13px; }
    .item-subtotal::before { content: 'Subtotal: '; color: var(--color-text-muted); font-weight: 400; font-size: 13px; }
    .order-header { padding: 20px; }
    .order-total-value { font-size: 22px; }
    .order-footer { padding: 14px 20px; flex-direction: column; gap: 8px; text-align: center; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div class="dashboard-page">
  <!-- Hero -->
  <header class="dashboard-hero">
    <div class="dashboard-hero-content">
      <div class="dashboard-hero-label">Administration</div>
      <h1>Order <em>Dashboard</em></h1>
      <p>Track order history, monitor sales, and review customer activity across your restaurant.</p>
    </div>
  </header>

  <!-- Stats -->
  <section class="stats-bar">
    <div class="stats-grid" id="statsGrid">
      <article class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statOrders">—</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value accent" id="statRevenue">—</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Items Sold</div>
        <div class="stat-value" id="statItems">—</div>
      </article>
      <article class="stat-card">
        <div class="stat-label">Unique Users</div>
        <div class="stat-value" id="statUsers">—</div>
      </article>
    </div>
  </section>

  <!-- Main Content -->
  <main class="dashboard-main">
    <div class="section-header">
      <h2>Recent Orders</h2>
      <span id="orderCount">Loading...</span>
    </div>

    <div id="ordersContainer">
      <!-- Skeleton loading -->
      <div class="orders-list">
        <div class="skeleton-card">
          <div class="skeleton-header"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line long"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-header"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line long"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const API_BASE = 'http://127.0.0.1:8000';
  const token = localStorage.getItem('access_token') || localStorage.getItem('access');

  // Category emojis for item icons
  const categoryEmojis = {
    'Fruits': '🍎',
    'Algerian Food': '🥘',
    'American Food': '🍔',
    'Japanese Food': '🍣',
    'Mexican Food': '🌮',
    'Italy Food': '🍝',
    'default': '🍽️'
  };

  function formatDate(isoString) {
    if (!isoString) return '—';
    const date = new Date(isoString);
    return date.toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric'
    }) + ' at ' + date.toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit'
    });
  }

  function getRoleBadgeClass(userStr) {
    if (!userStr) return 'role-default';
    const upper = userStr.toUpperCase();
    if (upper.includes('MANAGER')) return 'role-manager';
    if (upper.includes('DELIVERY')) return 'role-delivery';
    if (upper.includes('CUSTOMER')) return 'role-customer';
    return 'role-default';
  }

  function getRoleName(userStr) {
    if (!userStr) return 'User';
    const parts = userStr.split(' - ');
    return parts.length > 1 ? parts[1].trim() : 'User';
  }

  function getUserName(userStr) {
    if (!userStr) return 'Unknown';
    const parts = userStr.split(' - ');
    return parts[0].trim();
  }

  async function fetchDashboard() {
    const container = document.getElementById('ordersContainer');

    try {
      const response = await fetch(`${API_BASE}/api/dashboard/`, {
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': 'Bearer ' + token } : {})
        }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      const orders = data.orders || [];
      const count = data.count || orders.length;

      renderStats(orders);
      renderOrders(orders, count);

    } catch (err) {
      console.error('Dashboard fetch error:', err);
      container.innerHTML = `
        <div class="state-container state-error">
          <h3>Couldn&apos;t Load Dashboard</h3>
          <p>We encountered an error while fetching your order data. Please check your connection and try again.</p>
          <button class="retry-btn" onclick="fetchDashboard()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Retry
          </button>
        </div>
      `;
    }
  }

  function renderStats(orders) {
    const totalOrders = orders.length;
    const totalRevenue = orders.reduce((sum, o) => sum + parseFloat(o.total_price || 0), 0);
    const totalItems = orders.reduce((sum, o) => sum + (o.items_count || 0), 0);
    const uniqueUsers = new Set(orders.map(o => o.user)).size;

    document.getElementById('statOrders').textContent = totalOrders.toLocaleString();
    document.getElementById('statRevenue').textContent = '$' + totalRevenue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('statItems').textContent = totalItems.toLocaleString();
    document.getElementById('statUsers').textContent = uniqueUsers.toLocaleString();
  }

  function renderOrders(orders, count) {
    const container = document.getElementById('ordersContainer');
    const countEl = document.getElementById('orderCount');

    countEl.textContent = `${count} order${count !== 1 ? 's' : ''}`;

    if (orders.length === 0) {
      container.innerHTML = `
        <div class="state-container">
          <h3>No Orders Yet</h3>
          <p>There are no orders to display at the moment. New orders will appear here once customers start placing them.</p>
        </div>
      `;
      return;
    }

    const html = orders.map((order, index) => {
      const roleClass = getRoleBadgeClass(order.user);
      const roleName = getRoleName(order.user);
      const userName = getUserName(order.user);
      const dateStr = formatDate(order.date_ordered);
      const total = parseFloat(order.total_price || 0).toFixed(2);

      const itemsHtml = (order.items || []).map(item => {
        const emoji = categoryEmojis[item.item?.category_name] || categoryEmojis['default'];
        const title = item.item?.title || 'Unknown Item';
        const category = item.item?.category_name || '';
        const qty = item.quantity || 0;
        const price = parseFloat(item.price_at_time || item.item?.price || 0).toFixed(2);
        const subtotal = parseFloat(item.subtotal || 0).toFixed(2);

        return `
          <div class="item-row">
            <div class="item-info">
              <div class="item-icon">${emoji}</div>
              <div class="item-details">
                <h4>${title}</h4>
                <span>${category}</span>
              </div>
            </div>
            <span class="item-qty">${qty}</span>
            <span class="item-price">$${price}</span>
            <span class="item-subtotal">$${subtotal}</span>
          </div>
        `;
      }).join('');

      return `
        <article class="order-card" style="animation-delay: ${index * 0.08}s">
          <div class="order-header">
            <div class="order-meta">
              <div class="order-id">#${order.id}<span>Order</span></div>
              <span class="role-badge ${roleClass}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                ${roleName}
              </span>
              <span class="order-date">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                ${dateStr}
              </span>
            </div>
            <div class="order-total">
              <div class="order-total-label">Total</div>
              <div class="order-total-value">$${total}</div>
            </div>
          </div>
          <div class="order-items">
            <div class="items-header">
              <span>Item</span>
              <span>Qty</span>
              <span>Price</span>
              <span>Subtotal</span>
            </div>
            ${itemsHtml}
          </div>
          <div class="order-footer">
            <span>Ordered by <strong>${userName}</strong></span>
            <span>${order.items_count || 0} item${(order.items_count || 0) !== 1 ? 's' : ''}</span>
          </div>
        </article>
      `;
    }).join('');

    container.innerHTML = `<div class="orders-list">${html}</div>`;
  }

  // Initialize
  fetchDashboard();
</script>
