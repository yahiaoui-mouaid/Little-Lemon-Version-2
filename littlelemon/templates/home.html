{% extends 'base.html' %}

{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --lemon-green: #2d6a4f;
    --lemon-light: #d8f3dc;
    --lemon-accent: #40916c;
    --lemon-dark: #1b4332;
    --lemon-yellow: #f4d03f;
    --white: #ffffff;
    --off-white: #f8faf9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .ll-page {
    font-family: 'Inter', sans-serif;
    background: var(--off-white);
    min-height: 100vh;
    color: #1a1a1a;
  }

  /* Hero */
  .ll-hero {
    background: linear-gradient(135deg, var(--lemon-dark) 0%, var(--lemon-green) 50%, var(--lemon-accent) 100%);
    position: relative;
    overflow: hidden;
    padding: 80px 24px 100px;
    text-align: center;
  }
  .ll-hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.3;
    pointer-events: none;
  }
  .ll-hero-content { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
  .ll-hero-icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .ll-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -1px;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }
  .ll-hero p {
    font-size: 18px;
    color: var(--lemon-light);
    font-weight: 300;
    margin-bottom: 32px;
  }
  .ll-welcome-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 24px;
    border-radius: 50px;
    color: var(--white);
    font-size: 15px;
  }
  .ll-welcome-pill .name { font-weight: 700; color: var(--lemon-yellow); }

  /* Wave divider */
  .ll-wave {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    overflow: hidden;
    line-height: 0;
  }
  .ll-wave svg { display: block; width: calc(100% + 2px); height: 60px; }

  /* Main */
  .ll-main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }
  .ll-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .ll-section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--lemon-dark);
  }
  .ll-badge {
    background: var(--lemon-light);
    color: var(--lemon-dark);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
  }

  /* Category Grid */
  .ll-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  .ll-card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #e8f5e9;
    box-shadow: 0 4px 20px rgba(45,106,79,0.06);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
  }
  .ll-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(45,106,79,0.12);
    border-color: var(--lemon-accent);
  }
  .ll-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--lemon-green), var(--lemon-yellow));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ll-card:hover::after { opacity: 1; }
  .ll-card-visual {
    height: 160px;
    background: linear-gradient(135deg, #e8f5e9 0%, #d8f3dc 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .ll-card-visual::before {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
    border-radius: 50%;
  }
  .ll-card-icon {
    font-size: 56px;
    position: relative;
    z-index: 1;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ll-card:hover .ll-card-icon { transform: scale(1.15) rotate(-5deg); }
  .ll-card-body { padding: 24px; }
  .ll-card-body h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--lemon-dark);
    margin-bottom: 6px;
  }
  .ll-card-body p {
    font-size: 14px;
    color: var(--lemon-accent);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ll-card-body p::after {
    content: '→';
    transition: transform 0.3s;
  }
  .ll-card:hover .ll-card-body p::after { transform: translateX(4px); }

  /* Footer */
  .ll-footer {
    background: var(--lemon-dark);
    color: rgba(255,255,255,0.6);
    text-align: center;
    padding: 32px 24px;
    font-size: 14px;
  }
  .ll-footer span { color: var(--lemon-yellow); }

  /* Responsive */
  @media (max-width: 640px) {
    .ll-hero h1 { font-size: 36px; }
    .ll-hero { padding: 60px 20px 80px; }
    .ll-section-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .ll-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="ll-page">
  <header class="ll-hero">
    <div class="ll-hero-content">
      <div class="ll-hero-icon">🍋</div>
      <h1>Little Lemon</h1>
      <p>Fresh flavors, served with love since 2026</p>
      <div class="ll-welcome-pill">
        <span>Welcome back,</span>
        <span class="name" id="username-display">...</span>
      </div>
    </div>
    <div class="ll-wave">
      <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" fill="#f8faf9" opacity="1"></path>
      </svg>
    </div>
  </header>

  <main class="ll-main">
    <div class="ll-section-header">
      <h2>Our Menu Categories</h2>
      <span class="ll-badge" id="category-count">Loading...</span>
    </div>

    <div id="categories-grid" class="ll-grid">
      <!-- Categories injected here -->
    </div>
  </main>

  <footer class="ll-footer">
    <p>© 2026 <span>Little Lemon</span> Restaurant. Crafted with care.</p>
  </footer>
</div>

<script>
  (function() {
    const accessToken = localStorage.getItem('access_token');
    const usernameDisplay = document.getElementById('username-display');
    const categoriesGrid = document.getElementById('categories-grid');
    const categoryCount = document.getElementById('category-count');

    const categoryIcons = {
      'Fruits': '🍎',
      'Algerian Food': '🥘',
      'American Food': '🍔',
      'Japanese Food': '🍣',
      'Mexican Food': '🌮',
      'Italy Food': '🍝',
      'default': '🍽️'
    };

    // Fetch user info
    fetch('http://127.0.0.1:8000/auth/users/me/', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + accessToken
      }
    })
    .then(response => {
      if (response.ok) return response.json();
      throw new Error('Not authenticated');
    })
    .then(data => {
      usernameDisplay.textContent = data.username || 'Guest';
    })
    .catch(() => {
      usernameDisplay.textContent = 'Guest';
    });

    // Fetch categories
    fetch('http://127.0.0.1:8000/api/category-names/', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + accessToken
      }
    })
    .then(response => {
      if (response.ok) return response.json();
      throw new Error('Failed to load categories');
    })
    .then(categories => {
      categoryCount.textContent = categories.length + ' categories';

      if (categories.length === 0) {
        categoriesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#888;padding:40px;">No categories available.</p>';
        return;
      }

      categoriesGrid.innerHTML = categories.map(cat => {
        const icon = categoryIcons[cat.name] || categoryIcons['default'];
        return `
          <div class="ll-card">
            <div class="ll-card-visual">
              <span class="ll-card-icon">${icon}</span>
            </div>
            <div class="ll-card-body">
              <h3>${cat.name}</h3>
              <p>Explore dishes</p>
            </div>
          </div>
        `;
      }).join('');
    })
    .catch(() => {
      categoryCount.textContent = 'Error';
      categoriesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#c0392b;padding:40px;">Could not load categories. Please try again later.</p>';
    });
  })();
</script>

{% endblock %}
