{% extends 'base.html' %}

{% block content %}
<style>
    .logout-page {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 60px); /* full height minus navbar */
        padding: 20px;
        background-color: #f0fdf4;
    }

    .logout-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(22, 163, 74, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    h1 {
        color: #15803d;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .subtitle {
        color: #86efac;
        font-size: 14px;
        margin-bottom: 32px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #16a34a;
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }

    button:hover {
        background: #15803d;
    }

    button:active {
        transform: scale(0.98);
    }

    .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
    }

    .message.success {
        display: block;
        background: #dcfce7;
        color: #166534;
    }

    .message.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
    }

    .login-link {
        margin-top: 24px;
        font-size: 14px;
        color: #86efac;
    }

    .login-link a {
        color: #16a34a;
        text-decoration: none;
        font-weight: 500;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="logout-page">
    <div class="logout-card">
        <h1>Log Out</h1>
        <p class="subtitle">See you again soon</p>

        <button id="logoutBtn">Log Out</button>

        <div id="message" class="message"></div>

        <div class="login-link">
            <a href="/login/">Back to login</a>
        </div>
    </div>
</div>

<script>
document.getElementById('logoutBtn').addEventListener('click', function() {
    const messageEl = document.getElementById('message');
    messageEl.className = 'message';
    messageEl.textContent = '';

    const refreshToken = localStorage.getItem('refresh_token');

    function clearTokensAndRedirect(text, cssClass) {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');

        messageEl.textContent = text;
        messageEl.classList.add(cssClass);

        setTimeout(() => {
            window.location.href = '/login/';
        }, 1000);
    }

    if (refreshToken) {
        fetch('http://127.0.0.1:8000/auth/jwt/blacklist/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ refresh: refreshToken })
        })
        .then(() => {
            clearTokensAndRedirect('Logged out successfully.', 'success');
        })
        .catch(() => {
            clearTokensAndRedirect('Logged out locally.', 'success');
        });
    } else {
        clearTokensAndRedirect('You were not logged in.', 'error');
    }
});
</script>
{% endblock %}
