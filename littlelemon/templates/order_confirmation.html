{% extends 'base.html' %}

{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --color-bg: #fafaf9;
    --color-surface: #ffffff;
    --color-text: #1c1917;
    --color-text-muted: #78716c;
    --color-accent: #d97706;
    --color-accent-light: #fef3c7;
    --color-sage-light: #f5f5f4;
    --color-border: #e7e5e4;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
    --radius: 20px;
  }

  [data-theme="dark"] {
    --color-bg: #0c0a09;
    --color-surface: #1c1917;
    --color-text: #fafaf9;
    --color-text-muted: #a8a29e;
    --color-accent: #f59e0b;
    --color-accent-light: rgba(245, 158, 11, 0.1);
    --color-sage-light: #292524;
    --color-border: #44403c;
    --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.2);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -1px rgba(0,0,0,0.15);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.3), 0 10px 10px -5px rgba(0,0,0,0.2);
  }

  .order-page {
    font-family: var(--font-sans);
    background: var(--color-bg);
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  .order-container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  .order-header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeInUp 0.6s ease both;
  }
  .order-header-label {
    display: inline-block;
    color: var(--color-accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .order-header h1 {
    font-family: var(--font-serif);
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700;
    color: var(--color-text);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .order-header h1 em {
    font-style: italic;
    color: var(--color-accent);
  }
  .order-header p {
    color: var(--color-text-muted);
    font-size: 16px;
    line-height: 1.6;
  }

  /* Card */
  .order-card {
    background: var(--color-surface);
    border-radius: var(--radius);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: fadeInUp 0.6s ease 0.1s both;
  }

  /* Card Top Bar */
  .order-card-top {
    background: linear-gradient(135deg, #1c1917 0%, #292524 100%);
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .order-card-top::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(217, 119, 6, 0.15) 0%, transparent 70%);
  }
  .order-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-accent);
    position: relative;
    z-index: 1;
  }
  .order-icon svg {
    width: 24px;
    height: 24px;
  }
  .order-card-top h2 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin: 0;
    position: relative;
    z-index: 1;
  }
  .order-card-top p {
    margin: 4px 0 0;
    font-size: 14px;
    color: #a8a29e;
    position: relative;
    z-index: 1;
  }

  /* Table Header */
  .order-table-header {
    display: grid;
    grid-template-columns: 1fr 80px 100px 100px;
    gap: 16px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--color-border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-muted);
  }
  .order-table-header span:nth-child(2),
  .order-table-header span:nth-child(3),
  .order-table-header span:nth-child(4) {
    text-align: right;
  }

  /* Items List */
  .order-items {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .order-item {
    display: grid;
    grid-template-columns: 1fr 80px 100px 100px;
    gap: 16px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--color-border);
    align-items: center;
    animation: fadeInRow 0.4s ease both;
    transition: background 0.2s;
  }
  .order-item:hover {
    background: var(--color-sage-light);
  }
  .order-item:last-child {
    border-bottom: none;
  }

  .item-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .item-info-main {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }
  .item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-accent);
    flex-shrink: 0;
  }
  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text);
    line-height: 1.4;
  }

  .item-qty {
    text-align: right;
    font-size: 15px;
    font-weight: 700;
    color: var(--color-accent);
  }
  .item-price {
    text-align: right;
    font-size: 15px;
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
  }
  .item-total {
    text-align: right;
    font-size: 15px;
    font-weight: 700;
    color: var(--color-text);
    font-variant-numeric: tabular-nums;
  }

  /* Delete Button */
  .item-delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-muted);
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .item-delete-btn:hover {
    color: #dc2626;
    background: rgba(220, 38, 38, 0.1);
  }
  .item-delete-btn svg {
    width: 18px;
    height: 18px;
  }

  /* Summary Section */
  .order-summary {
    background: var(--color-sage-light);
    padding: 24px 32px;
    border-top: 1px solid var(--color-border);
  }
  .order-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--color-text-muted);
  }
  .order-summary-row:last-child {
    margin-bottom: 0;
    padding-top: 16px;
    border-top: 1px solid var(--color-border);
    font-size: 18px;
    font-weight: 700;
    color: var(--color-text);
  }
  .order-summary-row .total-label {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 700;
  }
  .order-summary-row .total-amount {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 700;
    color: var(--color-accent);
  }

  /* Actions */
  .order-actions {
    padding: 24px 32px 32px;
    display: flex;
    gap: 12px;
  }
  .order-btn {
    flex: 1;
    padding: 14px 24px;
    border-radius: 50px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    border: none;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .order-btn-primary {
    background: var(--color-text);
    color: #fff;
  }
  .order-btn-primary:hover {
    background: var(--color-accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(217, 119, 6, 0.25);
  }
  .order-btn-secondary {
    background: transparent;
    color: var(--color-text);
    border: 1px solid var(--color-border);
  }
  .order-btn-secondary:hover {
    background: var(--color-sage-light);
    border-color: var(--color-text);
  }

  /* State Messages */
  .order-state {
    padding: 60px 32px;
    text-align: center;
    color: var(--color-text-muted);
  }
  .order-state h3 {
    font-family: var(--font-serif);
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--color-text);
  }
  .order-state p {
    font-size: 15px;
    line-height: 1.6;
  }
  .order-state.error {
    color: #dc2626;
  }
  .order-state.error h3 {
    color: #dc2626;
  }

  /* Spinner */
  .spinner {
    width: 32px;
    height: 32px;
    margin: 0 auto 16px;
    border: 3px solid var(--color-sage-light);
    border-top-color: var(--color-accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInRow {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .order-page { padding: 24px 16px 60px; }
    .order-card-top { padding: 20px 24px; }
    .order-table-header { display: none; }
    .order-item {
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      padding: 16px 24px;
    }
    .item-info { grid-column: 1 / -1; }
    .item-qty::before { content: 'Qty: '; color: var(--color-text-muted); font-weight: 400; }
    .item-price::before { content: 'Each: '; color: var(--color-text-muted); font-weight: 400; }
    .item-total::before { content: 'Total: '; color: var(--color-text-muted); font-weight: 400; }
    .order-summary { padding: 20px 24px; }
    .order-actions { padding: 20px 24px 24px; flex-direction: column; }
    .order-btn { width: 100%; }
  }
</style>

<div class="order-page">
  <div class="order-container">
    <!-- Header -->
    <div class="order-header">
      <div class="order-header-label">Order Summary</div>
      <h1>Your <em>Basket</em></h1>
      <p>Review your selections before confirming your order.</p>
    </div>

    <!-- Card -->
    <div class="order-card">
      <!-- Top Bar -->
      <div class="order-card-top">
        <div class="order-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"></path>
          </svg>
        </div>
        <div>
          <h2>Your Basket</h2>
          <p>Items ready for checkout</p>
        </div>
      </div>

      <!-- Dynamic Content -->
      <div id="orderContent">
        <div class="order-state">
          <div class="spinner"></div>
          <h3>Loading your basket</h3>
          <p>Please wait while we fetch your items...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://127.0.0.1:8000';

  // Holds the merged basket items currently on screen, so confirmOrder()
  // can read them without needing a separate "cart" variable.
  let currentBasketItems = [];

  // ==================== MERGE DUPLICATE ITEMS ====================
  // Groups items by the "item" ID, sums quantities, and calculates totals.
  // Also collects the original cart-item IDs so we can DELETE them later.
  function mergeItems(items) {
    const map = new Map();

    items.forEach(item => {
      const itemId = item.item;
      const cartId = item.id || itemId; // cart-item primary key (fallback to itemId if missing)
      const name = item.item_name || 'Unknown Item';
      const unitPrice = parseFloat(item.item_price) || 0;
      const qty = parseInt(item.quantity, 10) || 0;

      if (map.has(itemId)) {
        const existing = map.get(itemId);
        existing.quantity += qty;
        existing.total = existing.unitPrice * existing.quantity;
        existing.cartIds.push(cartId);
      } else {
        map.set(itemId, {
          itemId: itemId, // menu item id — needed later to place the order
          name: name,
          quantity: qty,
          unitPrice: unitPrice,
          total: unitPrice * qty,
          cartIds: [cartId]
        });
      }
    });

    return Array.from(map.values());
  }

  // ==================== FETCH CART ITEMS ====================
  async function loadBasket() {
    const contentEl = document.getElementById('orderContent');
    const accessToken = localStorage.getItem('access_token') || localStorage.getItem('access');

    if (!accessToken) {
      contentEl.innerHTML = `
        <div class="order-state error">
          <h3>Authentication Required</h3>
          <p>Please log in to view your basket.</p>
        </div>
      `;
      return;
    }

    try {
      const response = await fetch(`${API_BASE}/api/cart-items/`, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + accessToken
        }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      const items = Array.isArray(data) ? data : (data.results || []);
      renderBasket(items);

    } catch (error) {
      console.error('Failed to load basket:', error);
      contentEl.innerHTML = `
        <div class="order-state error">
          <h3>Couldn&apos;t Load Basket</h3>
          <p>Please check your connection and try again.</p>
        </div>
      `;
    }
  }

  // ==================== DELETE ITEM ====================
  async function deleteCartItem(cartIds) {
    const accessToken = localStorage.getItem('access_token') || localStorage.getItem('access');
    if (!accessToken) {
      alert('Please log in to modify your basket.');
      return;
    }

    if (!confirm('Remove this item from your basket?')) return;

    try {
      const deletePromises = cartIds.map(id =>
        fetch(`${API_BASE}/api/cart-items/${id}/`, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + accessToken
          }
        })
      );

      const responses = await Promise.all(deletePromises);
      const failed = responses.filter(r => !r.ok);
      if (failed.length > 0) {
        throw new Error(`Failed to delete ${failed.length} item(s).`);
      }

      loadBasket(); // refresh the list
    } catch (error) {
      console.error('Delete failed:', error);
      alert('Could not remove item. Please try again.');
    }
  }

  // ==================== RENDER BASKET ====================
  function renderBasket(items) {
    const contentEl = document.getElementById('orderContent');

    if (!items || items.length === 0) {
      contentEl.innerHTML = `
        <div class="order-state">
          <h3>Your basket is empty</h3>
          <p>Browse our menu and add some delicious items.</p>
        </div>
        <div class="order-actions">
          <a href="/menu" class="order-btn order-btn-primary">Browse Menu</a>
        </div>
      `;
      return;
    }

    // Merge duplicates and calculate totals
    const mergedItems = mergeItems(items);
    currentBasketItems = mergedItems; // make available to confirmOrder()
    const grandTotal = mergedItems.reduce((sum, item) => sum + item.total, 0);
    const totalItems = mergedItems.reduce((sum, item) => sum + item.quantity, 0);

    // Build rows with staggered animation
    const rows = mergedItems.map((item, index) => {
      const cartIdsJson = JSON.stringify(item.cartIds);
      return `
      <li class="order-item" style="animation-delay: ${index * 0.05}s">
        <div class="item-info">
          <div class="item-info-main">
            <span class="item-dot"></span>
            <span class="item-name">${item.name}</span>
          </div>
          <button type="button" class="item-delete-btn" onclick='deleteCartItem(${cartIdsJson})' title="Remove item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
        <span class="item-qty">&times;${item.quantity}</span>
        <span class="item-price">$${item.unitPrice.toFixed(2)}</span>
        <span class="item-total">$${item.total.toFixed(2)}</span>
      </li>
    `;
    }).join('');

    contentEl.innerHTML = `
      <div class="order-table-header">
        <span>Item</span>
        <span>Qty</span>
        <span>Price</span>
        <span>Total</span>
      </div>
      <ul class="order-items">${rows}</ul>
      <div class="order-summary">
        <div class="order-summary-row">
          <span>Items (${totalItems})</span>
          <span>$${grandTotal.toFixed(2)}</span>
        </div>
        <div class="order-summary-row">
          <span>Tax &amp; Service</span>
          <span>Included</span>
        </div>
        <div class="order-summary-row">
          <span class="total-label">Grand Total</span>
          <span class="total-amount">$${grandTotal.toFixed(2)}</span>
        </div>
      </div>
      <div class="order-actions">
        <a href="/menu" class="order-btn order-btn-secondary">Add More</a>
        <button class="order-btn order-btn-primary" onclick="confirmOrder()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 13l4 4L19 7"></path>
          </svg>
          Confirm Order
        </button>
      </div>
    `;
  }

// ==================== CONFIRM ORDER ====================
  async function confirmOrder() {
    const accessToken = localStorage.getItem('access_token') || localStorage.getItem('access');

    if (!accessToken) {
      alert('Please log in to place your order.');
      return;
    }

    if (!currentBasketItems || currentBasketItems.length === 0) {
      alert('Your basket is empty.');
      return;
    }

    const btn = document.querySelector('.order-btn-primary');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `
      <svg class="spinner" style="width: 18px; height: 18px; margin: 0; border-color: rgba(255,255,255,0.3); border-top-color: #fff;" viewBox="0 0 24 24"></svg>
      Processing...
    `;

    try {
      const payload = {
        items: currentBasketItems.map(item => ({
          item_id: item.itemId,
          quantity: item.quantity
        }))
      };

      const response = await fetch(`${API_BASE}/api/orders-confirmation/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + accessToken
        },
        body: JSON.stringify(payload)
      });

      // --- THE FIX IS HERE ---
      if (!response.ok) {
        // 1. Unpack the raw error from Django
        const errorData = await response.json().catch(() => ({}));
        
        // 2. Log the raw object instantly before JavaScript can mangle it
        console.error("💥 Backend Error Details:", errorData);
        
        // 3. Throw a clean error to stop the process
        throw new Error(errorData.detail || 'Order request failed. See console for details.');
      }
      // -----------------------

      await response.json(); // the created order

      // Order placed — clear the cart items
      const allCartIds = currentBasketItems.flatMap(item => item.cartIds);
      await Promise.all(
        allCartIds.map(id =>
          fetch(`${API_BASE}/api/cart-items/${id}/`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + accessToken }
          })
        )
      );
      currentBasketItems = [];

      document.getElementById('orderContent').innerHTML = `
        <div class="order-state">
          <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--color-accent-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: var(--color-accent); font-size: 28px;">&#10003;</div>
          <h3>Order Confirmed!</h3>
          <p>Thank you for your order. We'll start preparing your meal right away.</p>
        </div>
        <div class="order-actions">
          <a href="/menu" class="order-btn order-btn-primary">Back to Menu</a>
        </div>
      `;
    } catch (err) {
      // 4. Log the readable message, not the blank object
      console.error('Order failed:', err.message);
      
      btn.disabled = false;
      btn.innerHTML = originalHTML;
      alert('Could not process your order. Please try again.');
    }
  }

  // ==================== INITIALIZATION ====================
  loadBasket();
</script>
{% endblock %}
