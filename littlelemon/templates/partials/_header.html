<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Lemon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg-primary: #fafaf9;
      --bg-secondary: #ffffff;
      --text-primary: #1c1917;
      --text-secondary: #78716c;
      --accent: #d97706;
      --accent-hover: #b45309;
      --nav-bg: rgba(250, 250, 249, 0.85);
      --nav-text: #1c1917;
      --nav-border: rgba(231, 229, 228, 0.5);
      --shadow: rgba(0,0,0,0.05);
      --transition-speed: 0.3s;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
      --radius: 12px;
    }

    [data-theme="dark"] {
      --bg-primary: #0c0a09;
      --bg-secondary: #1c1917;
      --text-primary: #fafaf9;
      --text-secondary: #a8a29e;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --nav-bg: rgba(12, 10, 9, 0.85);
      --nav-text: #fafaf9;
      --nav-border: rgba(68, 64, 60, 0.5);
      --shadow: rgba(0,0,0,0.3);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color var(--transition-speed), color var(--transition-speed);
      margin: 0;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Navbar */
    .navbar {
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 72px;
      border-bottom: 1px solid var(--nav-border);
      transition: all var(--transition-speed) ease;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .navbar.scrolled {
      box-shadow: 0 1px 3px var(--shadow);
    }

    .nav-brand {
      font-family: var(--font-serif);
      color: var(--text-primary);
      font-size: 1.5rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
      transition: color var(--transition-speed);
    }

    .nav-brand span {
      font-size: 1.3rem;
      display: inline-flex;
      align-items: center;
    }

    /* Desktop Nav Links */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 0.25rem;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    .nav-links li {
      display: flex;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      white-space: nowrap;
      position: relative;
      letter-spacing: 0.02em;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: rgba(0,0,0,0.03);
    }

    [data-theme="dark"] .nav-links a:hover {
      background: rgba(255,255,255,0.05);
    }

    .nav-links a.active {
      color: var(--accent);
      background: rgba(217, 119, 6, 0.08);
      font-weight: 600;
    }

    /* Icon Buttons (Basket & Theme) */
    .icon-btn {
      background: transparent;
      border: 1px solid var(--nav-border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.3s ease;
      color: var(--text-secondary);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      padding: 0;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(217, 119, 6, 0.05);
      transform: translateY(-1px);
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.5s ease, opacity 0.3s ease;
    }

    .icon-btn .sun-icon {
      position: absolute;
      opacity: 0;
      transform: rotate(-90deg) scale(0.5);
    }

    .icon-btn .moon-icon {
      position: absolute;
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    [data-theme="dark"] .icon-btn .sun-icon {
      opacity: 1;
      transform: rotate(0) scale(1);
    }

    [data-theme="dark"] .icon-btn .moon-icon {
      opacity: 0;
      transform: rotate(90deg) scale(0.5);
    }

    /* Basket badge */
    .basket-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--nav-bg);
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .basket-badge.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Hamburger Menu (Mobile) */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-around;
      width: 24px;
      height: 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-left: 0.75rem;
      z-index: 1100;
    }

    .hamburger span {
      width: 100%;
      height: 2px;
      background-color: var(--text-primary);
      border-radius: 2px;
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: translateX(-10px);
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 0 1.25rem;
        height: 64px;
      }

      .hamburger {
        display: flex;
      }

      .nav-links {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background: var(--nav-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        flex-direction: column;
        align-items: flex-start;
        padding: 1.5rem;
        gap: 0.25rem;
        transform: translateY(-20px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 30px var(--shadow);
        max-height: calc(100vh - 64px);
        overflow-y: auto;
        border-bottom: 1px solid var(--nav-border);
        border-top: 1px solid var(--nav-border);
      }

      .nav-links.active {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .nav-links li {
        width: 100%;
        border-bottom: 1px solid var(--nav-border);
      }

      .nav-links li:last-child {
        border-bottom: none;
      }

      .nav-links a {
        display: block;
        width: 100%;
        padding: 0.875rem 0;
        font-size: 1rem;
        border-radius: 0;
        background: transparent !important;
      }

      .nav-links a:hover {
        color: var(--accent);
        padding-left: 0.5rem;
      }

      .nav-links a.active {
        background: transparent !important;
        color: var(--accent);
      }

      .icon-btn {
        margin: 0.5rem 0 0 0;
        width: 44px;
        height: 44px;
      }
    }

    @media (max-width: 480px) {
      .nav-brand {
        font-size: 1.25rem;
      }
    }

    /* Loading state for nav */
    .nav-loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Body padding for fixed navbar */
    body {
      padding-top: 72px;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 64px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="/" class="nav-brand">
      <span>🍋</span> Little Lemon
    </a>
    
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <!-- Links will be injected by JavaScript based on user role -->
      <li style="padding: 1rem; color: var(--text-secondary); font-size: 0.875rem;">Loading...</li>

      <!-- Basket button -->
      <li>
        <button class="icon-btn" id="basketBtn" aria-label="View basket">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"></path>
          </svg>
          <span class="basket-badge" id="basketBadge">0</span>
        </button>
      </li>

      <!-- Theme toggle -->
      <li>
        <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"></path>
          </svg>
          <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"></path>
          </svg>
        </button>
      </li>
    </ul>
  </nav>

  <script>

    // ==================== CONFIGURATION ====================
    const API_BASE_URL = ''; // Set to your API base, e.g., 'http://127.0.0.1:8000'
    const AUTH_ENDPOINT = '/auth/users/me';

    // Link definitions: [href, label, roles[]]
    // Roles: 'manager', 'delivery', 'customer', 'guest'
    const ALL_LINKS = [
      { href: '/',         label: 'Home',         roles: ['manager', 'delivery', 'customer', 'guest'] },
      { href: '/members',   label: 'Members',      roles: ['manager', 'delivery'] },
      { href: '/menu',      label: 'Menu',         roles: ['manager', 'delivery', 'customer'] },
      { href: '/menu/create/',   label: 'New Dish',     roles: ['manager'] },
      { href: '/newcategory', label: 'New Category', roles: ['manager'] },
      { href: '/login',     label: 'Log in',   roles: ['guest'] },
      { href: '/signup',     label: 'Signup',   roles: ['guest'] },
      { href: '/myorders',     label: 'My Orders',   roles: ['manager', 'delivery', 'customer'] },
      { href: '/dashboard',     label: 'Dashboard',   roles: ['manager'] },
      { href: '/about',     label: 'About',        roles: ['manager', 'delivery', 'customer', 'guest'] },
      { href: '/logout',     label: 'Log out',   roles: ['manager', 'delivery', 'customer'] },
    ];

    // ==================== THEME TOGGLE ====================
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    
    const currentTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', currentTheme);

    themeToggle.addEventListener('click', () => {
      const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // ==================== BASKET BUTTON ====================
    document.getElementById('basketBtn').addEventListener('click', () => {
      window.location.href = '/order-confirmation';
    });

    // ==================== MOBILE HAMBURGER ====================
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    function closeMobileMenu() {
      hamburger.classList.remove('active');
      navLinks.classList.remove('active');
    }

    // ==================== SCROLL EFFECT ====================
    const navbar = document.getElementById('navbar');
    function handleScroll() {
      if (window.scrollY > 10) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();

    // ==================== FETCH USER ROLE ====================
    async function fetchUserRole() {
      try {
        const token = localStorage.getItem('access_token') || 
                      localStorage.getItem('token') || 
                      sessionStorage.getItem('token');

        if (!token) {
          return { role: 'guest', authenticated: false };
        }

        const response = await fetch(`${API_BASE_URL}${AUTH_ENDPOINT}`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          credentials: 'include',
        });

        if (!response.ok) {
          if (response.status === 401 || response.status === 403) {
            return { role: 'guest', authenticated: false };
          }
          throw new Error(`HTTP ${response.status}`);
        }

        const userData = await response.json();
        const role = (userData.role || userData.user_type || userData.type || 'customer').toLowerCase();
        
        return { role: role, authenticated: true, data: userData };

      } catch (error) {
        console.warn('Auth check failed:', error);
        return { role: 'guest', authenticated: false };
      }
    }

    // ==================== RENDER NAV LINKS ====================
    function renderNavLinks(userRole) {
      const visibleLinks = ALL_LINKS.filter(link => link.roles.includes(userRole));

      const persistentLis = Array.from(navLinks.querySelectorAll('li')).slice(-2);

      let linksHtml = '';
      visibleLinks.forEach(link => {
        linksHtml += `<li><a href="${link.href}" data-nav-link>${link.label}</a></li>`;
      });

      navLinks.innerHTML = linksHtml;
      persistentLis.forEach(li => navLinks.appendChild(li));

      highlightCurrentPage();

      navLinks.querySelectorAll('a[data-nav-link]').forEach(link => {
        link.addEventListener('click', closeMobileMenu);
      });
    }

    function highlightCurrentPage() {
      let currentPage = window.location.pathname;
      if (currentPage.endsWith('/')) currentPage = currentPage.slice(0, -1) || '/';
      if (!currentPage) currentPage = '/';

      const links = Array.from(document.querySelectorAll('.nav-links a[data-nav-link]'));
      
      links.forEach(link => link.classList.remove('active'));

      const matches = links.map(link => {
        let href = link.getAttribute('href');
        if (href.endsWith('/')) href = href.slice(0, -1) || '/';
        return { link, href };
      }).filter(({ href }) => {
        if (href === currentPage) return true;
        if (href === '/') return false;
        return currentPage.startsWith(href) && currentPage[href.length] === '/';
      });

      if (matches.length > 0) {
        const best = matches.reduce((a, b) => a.href.length >= b.href.length ? a : b);
        best.link.classList.add('active');
      }
    }

    // ==================== INITIALIZATION ====================
    async function initNavbar() {
      const user = await fetchUserRole();
      renderNavLinks(user.role);
    }

    initNavbar();
  </script>

</body>
</html>
